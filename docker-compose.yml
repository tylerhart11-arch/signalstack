services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signalstack}
      POSTGRES_USER: ${POSTGRES_USER:-signalstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signalstack}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - signalstack-postgres:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signalstack} -d ${POSTGRES_DB:-signalstack}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    working_dir: /workspace/backend
    restart: unless-stopped
    volumes:
      - ./backend:/workspace/backend
    environment:
      APP_NAME: SignalStack API
      API_PREFIX: /api
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-signalstack}:${POSTGRES_PASSWORD:-signalstack}@db:5432/${POSTGRES_DB:-signalstack}
      SIGNALSTACK_REFRESH_ON_STARTUP: ${SIGNALSTACK_REFRESH_ON_STARTUP:-true}
      SIGNALSTACK_BACKGROUND_REFRESH_ENABLED: ${SIGNALSTACK_BACKGROUND_REFRESH_ENABLED:-true}
      SIGNALSTACK_REFRESH_INTERVAL_HOURS: ${SIGNALSTACK_REFRESH_INTERVAL_HOURS:-1}
      SIGNALSTACK_EXCHANGE_CALENDAR: ${SIGNALSTACK_EXCHANGE_CALENDAR:-XNYS}
      SIGNALSTACK_MARKET_TIMEZONE: ${SIGNALSTACK_MARKET_TIMEZONE:-America/New_York}
      SIGNALSTACK_MARKET_OPEN_HOUR: ${SIGNALSTACK_MARKET_OPEN_HOUR:-9}
      SIGNALSTACK_MARKET_OPEN_MINUTE: ${SIGNALSTACK_MARKET_OPEN_MINUTE:-30}
      SIGNALSTACK_MARKET_CLOSE_HOUR: ${SIGNALSTACK_MARKET_CLOSE_HOUR:-16}
      SIGNALSTACK_MARKET_CLOSE_MINUTE: ${SIGNALSTACK_MARKET_CLOSE_MINUTE:-0}
      SIGNALSTACK_MARKET_LOOKBACK_DAYS: ${SIGNALSTACK_MARKET_LOOKBACK_DAYS:-160}
      FRED_API_KEY: ${FRED_API_KEY:-}
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 12

  frontend:
    image: node:20-alpine
    working_dir: /workspace/frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/workspace/frontend
      - signalstack-node-modules:/workspace/frontend/node_modules
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
    command: >
      sh -c "npm install &&
      npm run dev"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  signalstack-postgres:
  signalstack-node-modules:
